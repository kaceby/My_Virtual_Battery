  unit_of_measurement: "kWh"


# ==============================================================
# HISTORIQUE BATTERIE — RECALAGE DÉRIVE QUOTIDIENNE
# Récupère la dernière valeur connue de J-1 et J-2
# pour calculer la production locale de la veille
# ==============================================================
- name: "Battery In hier minuit"
  query: >
    SELECT s.state 
    FROM states s
    JOIN states_meta m ON s.metadata_id = m.metadata_id
    WHERE m.entity_id = 'YOUR_BATTERY_IN_ENTITY_ID'
    AND date(datetime(s.last_updated_ts, 'unixepoch', 'localtime')) = date('now', 'localtime', '-1 day')
    ORDER BY s.last_updated_ts DESC LIMIT 1;
  column: "state"
  unit_of_measurement: "kWh"

- name: "Battery In avant hier minuit"
  query: >
    SELECT s.state 
    FROM states s
    JOIN states_meta m ON s.metadata_id = m.metadata_id
    WHERE m.entity_id = 'YOUR_BATTERY_IN_ENTITY_ID'
    AND date(datetime(s.last_updated_ts, 'unixepoch', 'localtime')) = date('now', 'localtime', '-2 day')
    ORDER BY s.last_updated_ts DESC LIMIT 1;
  column: "state"
  unit_of_measurement: "kWh"
