#====================
# Urban solar
# ===================
# Historique du passé pour recalage batterie
- name: "In au moment du releve"
  query: >
    SELECT s.state 
    FROM states s
    JOIN states_meta m ON s.metadata_id = m.metadata_id
    WHERE m.entity_id = 'sensor.energy_battery_power_in' 
    AND s.last_updated_ts <= '{{ state_attr('input_datetime.releve_urban_solar_date', 'timestamp') }}'
    ORDER BY s.last_updated_ts DESC LIMIT 1;
  column: "state"
  unit_of_measurement: "kWh"

- name: "Out au moment du releve"
  query: >
    SELECT s.state 
    FROM states s
    JOIN states_meta m ON s.metadata_id = m.metadata_id
    WHERE m.entity_id = 'sensor.energy_battery_power_out' 
    AND s.last_updated_ts <= '{{ state_attr('input_datetime.releve_urban_solar_date', 'timestamp') }}'
    ORDER BY s.last_updated_ts DESC LIMIT 1;
  column: "state"
  unit_of_measurement: "kWh"
